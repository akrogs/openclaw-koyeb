# OpenClaw 24/7 en una VM (Oracle Cloud Always Free u otra).
# Construye la imagen desde el Dockerfile del repo (hornea openclaw.json, los workspaces
# y los scripts), con volumen persistente y reinicio automatico.
#
# Uso en la VM:
#   cp .env.example .env          # y rellena las 4 claves
#   docker compose up -d --build
#   docker compose logs -f openclaw   # ver el preflight y el arranque
#
# Acceso remoto con HTTPS gratis: ver el servicio 'cloudflared' (perfil "tunnel").

services:
  openclaw:
    build: .
    image: openclaw-koyeb:local
    container_name: openclaw
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=Europe/Madrid        # el agente da la hora/fecha en hora local de España
    # Por defecto el puerto se publica SOLO en localhost (acceso por tunel SSH/Cloudflare).
    # Para acceso directo por IP publica: pon OPENCLAW_BIND=0.0.0.0 en .env y abre el puerto
    # 18789 en el firewall (idealmente restringido a tu IP). Protegido por token + aprobacion.
    ports:
      - "${OPENCLAW_BIND:-127.0.0.1}:18789:18789"
    volumes:
      - openclaw-data:/home/node/.openclaw
      # Sandbox de ejecucion (tool 'exec'): socket de Docker del host para orquestar
      # contenedores hermanos aislados (Docker-in-Docker). El entrypoint da acceso al
      # usuario "node" al socket. Solo util si activas sandbox.mode en algun agente.
      - /var/run/docker.sock:/var/run/docker.sock
      # Dir de salida del sandbox con PARIDAD DE RUTAS (mismo path en host, gateway y sandbox):
      # el sandbox de exec escribe aqui (graficas/CSV) y el gateway las lee para entregarlas por Telegram.
      - /srv/out:/srv/out
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:18789/readyz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s

  # Opcional — tunel de Cloudflare para acceso remoto con HTTPS (gratis, sin abrir puertos).
  #   1) Crea un tunnel en https://one.dash.cloudflare.com (Networks > Tunnels), copia su token.
  #   2) Ponlo en .env como CLOUDFLARE_TUNNEL_TOKEN=...
  #   3) En el dashboard del tunnel, enruta tu hostname publico -> http://openclaw:18789
  #   4) Arranca con:  docker compose --profile tunnel up -d
  # (cloudflared alcanza a 'openclaw:18789' por la red interna de compose, sin puerto en el host.)
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: openclaw-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - openclaw
    profiles: ["tunnel"]

volumes:
  openclaw-data:
