# SearXNG para OpenClaw.
# Instancia INTERNA: solo accesible por el gateway via la red de compose (http://searxng:8080),
# sin puerto publicado al host. Por eso un secret_key fijo es aceptable (no hay UI publica).
use_default_settings: true

server:
  secret_key: "openclaw-searxng-internal-not-exposed"
  limiter: false        # sin limitador anti-bot: es interno, evita autobloquear a OpenClaw
  image_proxy: false

search:
  formats:
    - html
    - json              # OpenClaw consume la API JSON de SearXNG
